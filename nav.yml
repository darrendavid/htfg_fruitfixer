                - heading "Description" [level=3] [ref=e53]
                - paragraph [ref=e54]: There are many hundreds of types of bananas around the world and more than 100 ways to determine what type a banana is. The plants often mutate, making identification more complex. The poster shows the photos of many of some of the bananas found on the Big Island. Some are common and some are very rare. The parents of banana cultivars are Musa acuminata and Musa balbisiana. There are combinations of sets of chromosomes from the parents that are referred to as groups of A and B. For example, the Bluggoe, Popoulu, and Maoli varieties are in the AAB group, triploid and one part balbisiana. Musa acuminata gives the sweet fruit while Musa balbisiana gives the starch and hardier nature. What are commonly called cooking bananas can be enjoyed fresh when ripe and what are called dessert bananas can be enjoyed when cooked as a vegetable. Using green bananas as a vegetable is a common practice in many of the world's banana growing regions.
